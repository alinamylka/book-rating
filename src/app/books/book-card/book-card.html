<article class="card mb-4">
  <div class="card-body bg-light">
    <img class="img-thumbnail float-end" alt=""
         src="https://api.angular.schule/avatar/{{ book().rating }}">
    <header class="card-title">
      <h2>{{ book().title }}</h2>
      <span class="badge rounded-pill text-bg-secondary">
        Bewertung: {{ book().rating }}
      </span>
    </header>
    <p>{{ book().description }}</p>
    <p>Authors: {{ authors() }}</p>
    <p><strong>Preis:</strong> {{ book().price | currency:'CHF'}}</p>
    <app-rating-display [value]="book().rating"></app-rating-display>
    <button type="button" class="btn btn-green" (click)="doRateDown()" [disabled]="ratingDownDisabled()">-</button>
    <button type="button" class="btn btn-red" (click)="doRateUp()" [disabled]="ratingUpDisabled()">+</button>
    <a [routerLink]="['/books', book().isbn]" class="btn btn-primary">Details</a>
    <button type="button" class="btn btn-secondary" (click)="doDelete()">Delete</button>
  </div>
</article>
