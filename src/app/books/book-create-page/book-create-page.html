<form [formRoot]="bookForm">
  <div class="form-group">
    <label for="isbn">ISBN</label>
    <input type="text" id="isbn" class="form-control"
           [formField]="bookForm.isbn">
    @if(bookForm.isbn().touched() && bookForm.isbn().invalid()) {
      <div class="feedback-error">
        @for (error of bookForm.isbn().errors(); track error.kind) {
          <div>{{ error.message }} {{ error.kind }}</div>
        }
      </div>
    }

  </div>
  <div class="form-group">
    <label for="isbn">Title</label>
    <input type="text" id="title" class="form-control" [formField]="bookForm.title">
  </div>
  <div class="form-group">
    <label for="isbn">Description</label>
    <input type="text" id="description" class="form-control" [formField]="bookForm.description">
  </div>
  <div class="form-group">
    <label for="isbn">Price</label>
    <input type="number" id="price" class="form-control" [formField]="bookForm.price">
  </div>
  <div class="form-group">
    <label for="isbn">Rating</label>
    <input type="number" id="rating" class="form-control" [formField]="bookForm.rating">
  </div>
  <button type="submit" class="btn btn-primary" >Create Book</button>

</form>

<pre>{{ bookFormData() | json }}</pre>
