<button (click)="reload()" class="btn btn-secondary">Reload</button>
<div> status books: {{ books.status() }}</div>
@if (books.hasValue()) {
  <div>There are {{ books.value().length }} books in the library.</div>
  @for (book of books.value(); track book.isbn) {
    <app-book-card [book]="book" [ratingUpDisabled]="isRatingUpDisabled(book)"
                   [ratingDownDisabled]="isRatingDownDisabled(book)" (rateDown)="doRateDown($event)"
                   (rateUp)="doRateUp($event)"></app-book-card>
  }

}
